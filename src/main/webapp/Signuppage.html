<body class="instrument-serif-regular">
    <nav class="navbar navbar-expand-lg ">
        <div class="container-fluid">
            <i class="fa fa-book-open" aria-hidden="true"></i>
            <a class="text-white title" href="#">Lit Hub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse " id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link active text-white" aria-current="page" href="HomePage.html">ABOUT</a>
                    <a class="nav-link active text-white" aria-current="page" href="findabook.html">FIND A BOOK</a>

    <div class="container" style="max-width: 1050px;">
        <div class="row g-4 align-items-stretch signup-row">
            <div class="col-md-6 d-flex">
                <div class="card signup-card w-100">
                    <div class="card-header">
                        <h4>Sign Up</h4>
                    </div>
                    <div class="card-body">
                        <form id="signupForm">
                            <div class="mb-3">
                                <label for="inputName" class="form-label">UserName</label>
                                <input type="text" class="form-control" id="inputName"
                                    placeholder="Enter your UserName">
                                <div id="nameError" class="error-message text-danger"></div>
                            </div>
                            <div class="mb-3">
                                <label for="inputEmailUser" class="form-label">Email</label>
                                <input type="text" class="form-control" id="inputEmailUser"
                                    placeholder="Enter email">
                                <div id="emailError" class="error-message text-danger"></div>
                            </div>
                            <div class="mb-3">
                                <label for="inputPassword" class="form-label">Password</label>
                                <input type="password" class="form-control" id="inputPassword"
                                    placeholder="Enter password">
                                <div id="passwordError" class="error-message text-danger"></div>
                            </div>
                            <div class="mb-3">
                                <label for="dateofbirth" class="form-label">Date of Birth</label>
                                <input type="date" class="form-control" id="date">
                                <div id="dateError" class="error-message text-danger"></div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Sign Up</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-5 d-flex">
                <div class="card h-100 overflow-hidden border-0 shadow-sm signup-image-card w-100">
                    <img src="https://i.pinimg.com/1200x/e2/15/19/e21519f1743c90808b53e62d6c571a75.jpg"
                        alt="Literary inspiration" class="img-fluid h-100 w-100 object-fit-cover"
                        style="object-fit: cover; min-height: 100%;">
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
<script>
function validateName(name) {
    if (name.trim() === "") return "Username is required";
    if (name.length < 3) return "Username must be at least 3 characters";
    if (!/^[A-Za-z0-9_]+$/.test(name)) 
        return "Username can only contain letters, numbers, and underscore";
    return "";
}

    function validateEmailOrUsername(value) {
        if (value.trim() === "") return "Email or Username is required";
        if (value.includes("@")) {
            if (!/^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(value))
                return "Enter a valid email address";
        } else {
            if (value.length < 5) return "Username must be at least 5 characters";
            if (!/^[A-Za-z0-9_]+$/.test(value))
                return "Username can only contain letters, numbers, and underscore";
        }
        return "";
    }

    function validatePassword(password) {
        if (password === "") return "Password is required";
        if (password.length < 6 || !/\d/.test(password) || !/[A-Z]/.test(password))
            return "Password must be at least 6 characters, contain a number and uppercase letter";
        return "";
    }

    function validateDate(date) {
        if (date === "") return "Date of Birth is required";
        var birthDate = new Date(date);
        var today = new Date();
        var age = today.getFullYear() - birthDate.getFullYear();
        var m = today.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
        if (age < 13) return "You must be at least 13 years old";
        if (age > 120) return "Please enter a valid date of birth";
        return "";
    }

    // ── Live validation listeners ─────────────────────────────────────────
    function attachValidator(inputId, errorId, fn) {
        var input = document.getElementById(inputId);
        input.addEventListener("input", function() {
            var error = fn(this.value);
            document.getElementById(errorId).textContent = error;
            this.classList.toggle("is-invalid", !!error);
            this.classList.toggle("is-valid",   !error);
        });
    }

    attachValidator("inputName",      "nameError",     validateName);
    attachValidator("inputEmailUser", "emailError",    validateEmailOrUsername);
    attachValidator("inputPassword",  "passwordError", validatePassword);
    attachValidator("date",           "dateError",     validateDate);

    // ── Submit ────────────────────────────────────────────────────────────
    document.getElementById("signupForm").addEventListener("submit", function(event) {
        event.preventDefault();

        var name     = document.getElementById("inputName").value;
        var email    = document.getElementById("inputEmailUser").value;
        var password = document.getElementById("inputPassword").value;
        var dob      = document.getElementById("date").value;

        var nameError     = validateName(name);
        var emailError    = validateEmailOrUsername(email);
        var passwordError = validatePassword(password);
        var dateError     = validateDate(dob);

        document.getElementById("nameError").textContent     = nameError;
        document.getElementById("emailError").textContent    = emailError;
        document.getElementById("passwordError").textContent = passwordError;
        document.getElementById("dateError").textContent     = dateError;

        if (nameError || emailError || passwordError || dateError) return;

        // ── Call backend ──────────────────────────────────────────────────
        var params = new URLSearchParams();
        params.append("name",     name);
        params.append("email",    email);
        params.append("password", password);
        params.append("dob",      dob);

        fetch("api/register", {
            method:  "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body:    params.toString()
        })
        .then(function(resp) { return resp.json(); })
        .then(function(data) {
            if (data.success) {
                LitHubAuth.save(data.token || "", data.username, data.userId);
                window.location.href = "Dashboard.html";
            } else {
                // Show server error under email field
                document.getElementById("emailError").textContent = data.message || "Registration failed";
                document.getElementById("inputEmailUser").classList.add("is-invalid");
            }
        })
        .catch(function(err) {
            console.error("Signup error:", err);
            document.getElementById("emailError").textContent = "Server error, please try again.";
        });
    });
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
